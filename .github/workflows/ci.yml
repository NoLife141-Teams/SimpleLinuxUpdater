name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect Go and workflow changes
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/**'

  test:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: race
            cmd: go test -race -count=1 ./...
          - name: cover
            cmd: go test -covermode=atomic -coverprofile=coverage.out ./...
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.cmd }}

      - name: Show coverage summary
        if: matrix.name == 'cover'
        run: go tool cover -func=coverage.out | tail -n 1

  quality:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install quality tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run Go vet
        run: go vet ./...

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run actionlint
        run: actionlint

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Run frontend unit tests
        run: npm run test:unit

  ui-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      PLAYWRIGHT_WEBSERVER_COMMAND: 'mkdir -p .tmp-e2e && rm -f .tmp-e2e/servers.db && : > .tmp-e2e/known_hosts && DEBIAN_UPDATER_DB_PATH=.tmp-e2e/servers.db DEBIAN_UPDATER_KNOWN_HOSTS=.tmp-e2e/known_hosts ./webserver'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build webserver
        run: go build -o webserver .

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright browser and OS dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright auth E2E
        run: npm run test:e2e

  ci-required:
    if: always()
    needs:
      - changes
      - test
      - quality
      - npm-audit
      - frontend-unit
      - ui-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Verify required CI results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          GO_REQUIRED: ${{ github.event_name == 'push' || needs.changes.outputs.go == 'true' }}
          TEST_RESULT: ${{ needs.test.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          NPM_AUDIT_RESULT: ${{ needs.npm-audit.result }}
          FRONTEND_UNIT_RESULT: ${{ needs.frontend-unit.result }}
          UI_E2E_RESULT: ${{ needs.ui-e2e.result }}
        run: |
          printf '%s\n' \
            "changes=$CHANGES_RESULT" \
            "go_required=$GO_REQUIRED" \
            "test=$TEST_RESULT" \
            "quality=$QUALITY_RESULT" \
            "npm_audit=$NPM_AUDIT_RESULT" \
            "frontend_unit=$FRONTEND_UNIT_RESULT" \
            "ui_e2e=$UI_E2E_RESULT"

          test "$CHANGES_RESULT" = success
          test "$NPM_AUDIT_RESULT" = success
          test "$FRONTEND_UNIT_RESULT" = success
          test "$UI_E2E_RESULT" = success

          if [ "$GO_REQUIRED" = true ]; then
            test "$TEST_RESULT" = success
            test "$QUALITY_RESULT" = success
          else
            test "$TEST_RESULT" = skipped
            test "$QUALITY_RESULT" = skipped
          fi
